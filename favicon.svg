<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d2e"/>
      <stop offset="100%" style="stop-color:#0f1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c8ef5"/>
      <stop offset="100%" style="stop-color:#4f6ef2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- Document body -->
  <rect x="7" y="5" width="14" height="18" rx="1.5" fill="white" opacity="0.95"/>
  <!-- Folded corner -->
  <polygon points="17,5 21,9 17,9" fill="url(#accent)"/>
  <polygon points="17,5 21,5 21,9" fill="#c8d4fc" opacity="0.6"/>
  <!-- Lines on document -->
  <rect x="9" y="12" width="8" height="1.2" rx="0.6" fill="#b0b8d8" opacity="0.7"/>
  <rect x="9" y="15" width="10" height="1.2" rx="0.6" fill="#b0b8d8" opacity="0.5"/>
  <rect x="9" y="18" width="6" height="1.2" rx="0.6" fill="#b0b8d8" opacity="0.4"/>
  <!-- Blue accent dot bottom-right -->
  <circle cx="23" cy="23" r="5" fill="url(#accent)"/>
  <text x="23" y="26.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="bold" fill="white">P</text>
</svg>
